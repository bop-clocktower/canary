[build-system]
requires = ["setuptools>=82.0.1"]
build-backend = "setuptools.build_meta"

[project]
name = "oracle-test-ai"
version = "2.3.1"
description = "AI-powered test automation agent"
requires-python = ">=3.10"
dependencies = [
    "anthropic>=0.102.0,<2",
    "google-genai>=2.3.0",
    "openai>=2.37.0,<3",
    "typer>=0.12,<1",
    "rich>=13.7,<16",
    "fastmcp>=2.0",
]

[project.scripts]
oracle = "agent.cli:app"
oracle-mcp = "agent.mcp_server:main"

[tool.setuptools.packages.find]
include = ["agent*"]
exclude = ["agents*", "tests*", "docs*", "scripts*"]

[tool.setuptools.package-data]
"agent" = ["frameworks/*.json"]
