[build-system]
requires = ["setuptools>=82.0.1"]
build-backend = "setuptools.build_meta"

[project]
name = "oracle-test-ai"
version = "3.0.0"
description = "AI-powered test automation agent"
requires-python = ">=3.10"
dependencies = [
    "typer>=0.12,<1",
    "rich>=13.7,<16",
    "fastmcp>=2.0",
]

[project.scripts]
oracle = "agent.cli:app"
oracle-mcp = "agent.mcp_server:main"

[tool.setuptools.packages.find]
include = ["agent*"]
exclude = ["agents*", "tests*", "docs*", "scripts*"]

[tool.setuptools.package-data]
"agent" = ["frameworks/*.json"]
