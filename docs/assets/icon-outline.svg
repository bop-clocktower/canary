<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img">
  <title>Canary icon — outline variant</title>
  <desc>Geometric canary bird mark, outline/ghost style</desc>
  <rect width="64" height="64" rx="10" fill="none" stroke="#F0C040" stroke-width="1.5"/>
  <!-- Body -->
  <polygon points="14,52 26,28 40,26 42,48 32,58 18,60" fill="none" stroke="#F0C040" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Wing upper -->
  <polygon points="26,28 40,26 50,14 38,24 30,30" fill="none" stroke="#D4A820" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Wing lower -->
  <polygon points="14,52 26,44 32,58 18,60" fill="none" stroke="#D4A820" stroke-width="1" stroke-linejoin="round"/>
  <!-- Tail -->
  <polygon points="42,48 50,56 44,62 38,56 42,52" fill="none" stroke="#D4A820" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Head -->
  <circle cx="14" cy="40" r="10" fill="none" stroke="#F0C040" stroke-width="1.5"/>
  <!-- Eye -->
  <circle cx="10" cy="37" r="2" fill="#F0C040"/>
  <!-- Beak -->
  <polygon points="4,39 0,42 4,44" fill="#F0C040"/>
</svg>
