name: PR Guardian
on:
  pull_request:
permissions:
  contents: read
  pull-requests: write # commenting; fork PRs get read-only → poster degrades
concurrency:
  group: guardian-${{ github.event.pull_request.number }}
  cancel-in-progress: true
jobs:
  guardian:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install canary
        run: pip install -e .
      # OPTIONAL (commented): lift fidelity to graph-verified where harness is present.
      #   Baseline is heuristic on stock CI (graph.json is gitignored). See plan Assumptions.
      # - run: npx --yes -p @harness-engineering/cli harness graph
      - name: Compute PR diff
        env:
          BASE: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "$BASE"
          git diff "origin/${BASE}...HEAD" > pr.diff
      - name: Guardian pr-check
        env:
          GITHUB_TOKEN: ${{ github.token }}
        # `--emit-analysis` writes the finding record to the .harness/analyses/
        # channel (the #899 harness reverse-handoff producer); `--post-comment`
        # keeps findings visible while the harness consumer (#899) is pending —
        # once harness surfaces the record in `pre-merge-brief`, drop
        # `--post-comment`. On an unavailable channel the emit degrades LOUDLY
        # and falls back to the sticky comment (SC-10) — never a silent drop.
        run: |
          canary guardian pr-check --diff pr.diff --emit-analysis --post-comment
      # Required-check (#311, "one gate not two"): under `canary.guardian.pr.gate:
      # hard` this job exits non-zero on unaddressed critical/high findings. A repo
      # admin registers the check "PR Guardian / guardian" (workflow `name:` + job
      # id, both kept stable) as a REQUIRED status check in branch protection,
      # alongside harness/validate/enforce. Repo-admin action — full guide in
      # Phase 6.
