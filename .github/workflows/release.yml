name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create/upload release assets
  id-token: write   # needed for npm provenance

jobs:
  build-binaries:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform_key: linux-x64
            binary_name: canary-linux-x64
          - os: macos-14
            platform_key: darwin-arm64
            binary_name: canary-darwin-arm64
          - os: windows-2022
            platform_key: win32-x64
            binary_name: canary-win32-x64.exe

    steps:
      - name: Allow colon in filenames (Windows NTFS)
        if: runner.os == 'Windows'
        run: git config --global core.protectNTFS false
        shell: bash

      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies + PyInstaller
        run: pip install -e ".[dev]"

      - name: Build binary
        run: pyinstaller canary.spec --clean --noconfirm

      - name: Rename binary to platform name
        shell: bash
        run: |
          if [[ "${{ matrix.platform_key }}" == "win32-x64" ]]; then
            mv dist/canary.exe dist/${{ matrix.binary_name }}
          else
            mv dist/canary dist/${{ matrix.binary_name }}
          fi

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.binary_name }}
          path: dist/${{ matrix.binary_name }}

  publish:
    name: Publish to GitHub Releases + npm
    needs: build-binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: dist/

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          files: dist/**/*
          generate_release_notes: true

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Publish npm package
        working-directory: npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    # Builds the sdist + wheel from pyproject.toml (canary-test-ai) and uploads to
    # PyPI via Trusted Publishing (OIDC) — no long-lived API token secret required.
    #
    # ONE-TIME SETUP on PyPI (pypi.org → project "canary-test-ai" → Publishing, or a
    # "pending publisher" if the project does not exist yet): add a GitHub trusted
    # publisher with owner=bop-clocktower, repo=canary, workflow=release.yml. Until
    # that is configured this job will fail auth.
    #
    # TOKEN FALLBACK (if you prefer a token over OIDC): drop the `id-token` perm,
    # add repo secret PYPI_API_TOKEN, and give the publish step
    #   with: { password: ${{ secrets.PYPI_API_TOKEN }} }
    permissions:
      id-token: write # OIDC token for PyPI Trusted Publishing

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  advance-latest:
    name: Advance latest → ${{ github.ref_name }}
    needs: publish
    runs-on: ubuntu-latest
    # Only advance for stable vX.Y.Z tags, never pre-releases (e.g. v1.2.0-rc1).
    if: ${{ !contains(github.ref_name, '-') }}

    permissions:
      contents: write # needed to push the floating tag

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Move latest tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa latest "$RELEASE_SHA" -m "latest → ${RELEASE_TAG}"
          git push origin latest --force
          echo "Moved latest → ${RELEASE_TAG} (${RELEASE_SHA})"
