name: Security Reviewer

on:
  pull_request:
    paths:
      - "agent/**"
      - "tests/**"
      - "pyproject.toml"

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npx --yes -p @harness-engineering/cli harness validate
      - run: npx --yes -p @harness-engineering/cli harness check-deps
      - run: npx --yes -p @harness-engineering/cli harness check-security --severity error
