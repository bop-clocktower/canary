name: Harness Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: harness-${{ github.ref }}
  cancel-in-progress: true

# Pin the harness CLI to a major (#318 A). A harness-major bump is a deliberate
# PR that edits this one line — never a silent break from an unpinned @latest
# after an upstream subcommand rename. See AGENTS.md "Harness dependency surface".
env:
  HARNESS_CLI: '@harness-engineering/cli@9'

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - run: npm install -g "$HARNESS_CLI"
      - name: Run harness checks
        run: harness ci check --json
