name: Oracle Test Generation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: oracle-generate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: Generate tests for changed files
    runs-on: ubuntu-latest
    # Skip on dependabot PRs and forks without access to secrets
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect LLM provider
        id: provider
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "name=claude" >> "$GITHUB_OUTPUT"
          elif [ -n "$OPENAI_API_KEY" ]; then
            echo "name=openai" >> "$GITHUB_OUTPUT"
          elif [ -n "$GEMINI_API_KEY" ]; then
            echo "name=gemini" >> "$GITHUB_OUTPUT"
          else
            echo "name=" >> "$GITHUB_OUTPUT"
            echo "::notice::No LLM API key found in secrets — skipping Oracle test generation."
          fi

      - name: Generate tests with Oracle
        if: steps.provider.outputs.name != ''
        uses: ./
        with:
          provider: ${{ steps.provider.outputs.name }}
          api-key: ${{ secrets.ANTHROPIC_API_KEY || secrets.OPENAI_API_KEY || secrets.GEMINI_API_KEY }}
          comment: ${{ github.event_name == 'pull_request' }}
