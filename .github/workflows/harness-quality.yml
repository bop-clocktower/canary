name: Quality & Integrity

on:
  pull_request:
  push:
    branches:
      - main

# Pin the harness CLI to a major (#318 A) — see AGENTS.md "Harness dependency surface".
env:
  HARNESS_CLI: '@harness-engineering/cli@9'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        # Surgical install: the quality job only needs the test + coverage
        # tooling, not the full dev extra (which pulls in pyinstaller).
        run: pip install -e . pytest coverage

      - name: Run Unit Tests (with coverage gate)
        # Run under pytest so the full suite executes (unittest discover only
        # collects TestCase classes and silently skipped the pytest
        # function-style tests). `coverage report` enforces the fail_under
        # floor from pyproject's [tool.coverage.report].
        run: |
          coverage run -m pytest tests/unit -q
          coverage report

      - name: Hook customization guard
        # Fail loudly if a harness regeneration clobbered a canary-local hook
        # edit (the blocking quality gate, the formatter path-fix, or the
        # non-blocking telemetry decision). See #318 C.
        run: python3 scripts/check_hook_customizations.py

      - name: Harness Docs Coverage
        run: npx --yes -p "$HARNESS_CLI" harness check-docs
        continue-on-error: true # allow warnings for now as we transition

      - name: Harness Cleanup (Entropy Scan)
        run: npx --yes -p "$HARNESS_CLI" harness cleanup
        continue-on-error: true # entropy analysis requires entry-point config; surface findings without blocking

      - name: Harness Phase Gate
        run: npx --yes -p "$HARNESS_CLI" harness check-phase-gate

      - name: Security Ledger Freshness
        run: |
          python3 scripts/security_ledger.py
          if ! git diff --exit-code -- \
              .harness/security/timeline.json \
              docs/SECURITY_LEDGER.md; then
            echo
            echo "::error::Security ledger is stale."
            echo "Run \`python3 scripts/security_ledger.py\` locally and commit the diff."
            exit 1
          fi

  ts-validate:
    # Pilot of the Python→TS strangler migration (docs/plans/2026-07-22-ts-
    # migration-pilot-analysis-plan.md). Independent of the Python `validate`
    # job — the two run in parallel and the Python engine is unaffected.
    name: TS engine (pilot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install TS pilot deps
        working-directory: ts
        run: npm ci

      - name: Typecheck (tsc strict)
        working-directory: ts
        run: npm run typecheck

      - name: Format check (prettier)
        working-directory: ts
        run: npm run format:check

      - name: Test + coverage gate (vitest)
        working-directory: ts
        run: npm test
