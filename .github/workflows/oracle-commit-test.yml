name: Commit Oracle Test to PR Branch

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to commit the generated test to'
        required: true
        type: number
      provider:
        description: 'LLM provider (claude, openai, gemini, mock)'
        required: false
        default: 'claude'

jobs:
  commit:
    name: Regenerate and commit test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Resolve PR branch
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          BRANCH=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.head.ref')
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0
          # Use a PAT if available so the push triggers downstream CI.
          # Falls back to the built-in token (push will not re-trigger PR checks).
          token: ${{ secrets.ORACLE_COMMIT_TOKEN || github.token }}

      - name: Generate test
        id: oracle
        uses: ./
        with:
          provider: ${{ inputs.provider }}
          api-key: ${{ secrets.ANTHROPIC_API_KEY || secrets.OPENAI_API_KEY || secrets.GEMINI_API_KEY || 'mock' }}
          # Don't post a second comment — the original comment already exists.
          comment: 'false'

      - name: Commit and push
        env:
          OUTPUT_FILE: ${{ steps.oracle.outputs.output-file }}
          TEST_TYPE: ${{ steps.oracle.outputs.test-type }}
          FRAMEWORK: ${{ steps.oracle.outputs.framework }}
          PR_NUMBER: ${{ inputs.pr_number }}
          PROVIDER: ${{ inputs.provider }}
        run: |
          if [ -z "$OUTPUT_FILE" ] || [ ! -f "$OUTPUT_FILE" ]; then
            echo "::error::No test file was generated — check the generate step logs."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$OUTPUT_FILE"
          if git diff --staged --quiet; then
            echo "::notice::Nothing to commit — file may already be tracked."
          else
            git commit -m "test: add Oracle-generated test for PR #${PR_NUMBER}

Generated by Oracle (provider: ${PROVIDER})
Test type: ${TEST_TYPE}
Framework: ${FRAMEWORK}"
            git push
            echo "::notice::Committed ${OUTPUT_FILE}"
          fi

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
          OUTPUT_FILE: ${{ steps.oracle.outputs.output-file }}
          TEST_TYPE: ${{ steps.oracle.outputs.test-type }}
          FRAMEWORK: ${{ steps.oracle.outputs.framework }}
        run: |
          gh pr comment "${PR_NUMBER}" \
            --repo "${REPO}" \
            --body "### Oracle — test committed

| | |
|---|---|
| **Test type** | \`${TEST_TYPE}\` |
| **Framework** | \`${FRAMEWORK}\` |
| **File** | \`${OUTPUT_FILE}\` |

The generated test has been committed to this branch. Review it, adapt as needed, and it will run as part of your regular CI.

---
*Generated by [Oracle](https://github.com/bri-stevenski/oracle-test-ai-agent)*" || true
